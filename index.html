<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Courtguessr</title>
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>

  <header>
    <div class="logo">Courtguessr</div>
  </header>

  <main id="game">
    <div class="arena">

      <div class="panel" id="panel-left">
        <img class="headshot" id="left-img" src="" alt="" />
        <div class="player-name" id="left-name">—</div>
        <div class="player-meta" id="left-team">—</div>
        <div class="stat-num" id="left-val">—</div>
        <button class="pick-btn" id="btn-left" onclick="submitGuess('left')">
          Pick this player
        </button>
      </div>

      <div class="divider">
        <span class="vs-text">VS</span>
        <div class="streak-wrap">
          <span class="streak-label">STREAK</span>
          <span class="streak-num" id="score">0</span>
        </div>
        <span class="center-stat" id="stat-label">—</span>
      </div>

      <div class="panel" id="panel-right">
        <img class="headshot" id="right-img" src="" alt="" />
        <div class="player-name" id="right-name">—</div>
        <div class="player-meta" id="right-team">—</div>
        <div class="stat-num hidden-val" id="right-val">???</div>
        <button class="pick-btn" id="btn-right" onclick="submitGuess('right')">
          Pick this player
        </button>
      </div>

    </div>
  </main>

  <div class="overlay hidden" id="overlay">
    <div class="overlay-box">
      <p class="go-label">GAME OVER</p>
      <img class="go-gif" id="go-gif" src="" alt="" />
      <p class="go-caption" id="go-caption"></p>
      <p class="go-streak">Final streak</p>
      <p class="go-score" id="final-score">0</p>
      <div class="go-actions">
        <button class="restart-btn" onclick="startGame()">Play again</button>
        <button class="share-btn" id="share-btn" onclick="shareScore()" aria-label="Share score">
          <!-- X / Twitter logo — shown on desktop -->
          <svg class="icon-x" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
            <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.746l7.73-8.835L1.254 2.25H8.08l4.713 6.231 5.45-6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/>
          </svg>
          <!-- Share arrow — shown on mobile (uses Web Share API) -->
          <svg class="icon-share" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/>
            <polyline points="16 6 12 2 8 6"/>
            <line x1="12" y1="2" x2="12" y2="15"/>
          </svg>
        </button>
      </div>
      <p class="share-confirm hidden" id="share-confirm">Copied!</p>
    </div>
  </div>

  <footer>
    <p>CourtGuessr is an independent project and is not affiliated with, endorsed by, or sponsored by the National Basketball Association.</p>
  </footer>

  <script src="/static/game.js"></script>
</body>
</html>
